name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}
        run: |
          chmod +x ./gradlew
          mkdir -p ~/.gradle
          {
            echo "org.gradle.java.home=${JAVA_HOME_21_X64}"
            echo "org.gradle.java.installations.paths=${JAVA_HOME_25_X64},${JAVA_HOME_21_X64}"
          } >> ~/.gradle/gradle.properties
          ./gradlew clean build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: InventoryStacks
          path: build/libs/*.jar

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
