name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}
        run: |
          chmod +x ./gradlew
          mkdir -p ~/.gradle
          {
            echo "org.gradle.java.home=${JAVA_HOME_21_X64}"
            echo "org.gradle.java.installations.paths=${JAVA_HOME_25_X64},${JAVA_HOME_21_X64}"
          } >> ~/.gradle/gradle.properties
          ./gradlew clean build

      - name: Resolve Version
        id: version
        run: |
          VERSION="$(awk '/^version:/ { print $2; exit }' src/main/resources/plugin.yml)"
          if [ -z "$VERSION" ]; then
            echo "Unable to resolve plugin version from plugin.yml" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check Release Tag
        id: release_tag
        if: github.ref == 'refs/heads/master'
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check GitHub Release
        id: release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          STATUS="$(
            curl -sS -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}"
          )"
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release Tag
        if: github.ref == 'refs/heads/master' && steps.release_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: InventoryStacks
          path: build/libs/*.jar

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') || (github.ref == 'refs/heads/master' && steps.release.outputs.exists == 'false')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || steps.version.outputs.tag }}
          files: build/libs/*.jar
          generate_release_notes: true
